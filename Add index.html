<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rachidpro - Encyclopédie Physique Interactive</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js">
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header"><h1>Rachidpro</h1></header>
    <div class="main-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>📚 Sections</h3>
                <select class="section-select" id="sectionSelect">
                    <option value="sec1">⚡ Électricité</option>
                    <option value="sec2">🔬 Physique Moderne</option>
                    <option value="sec3">💡 Lumière & Réflexion</option>
                    <option value="sec4">🎵 Ondes Sonores</option>
                    <option value="sec5">🚗 Mouvement</option>
                    <option value="sec6">🏋️ Force & Mouvement</option>
                    <option value="sec7">🌡️ Chaleur</option>
                    <option value="sec8">🪐 Gravitation</option>
                    <option value="sec9">🌀 Magnétisme</option>
                </select>
            </div>
            <div class="formula-list" id="formulaList"></div>
        </aside>
        <main class="content-area">
            <div class="content-card" id="contentCard">
                <div class="content-placeholder" id="placeholder">
                    <span style="font-size:4.5rem;display:block;margin-bottom:18px;">📖</span>
                    <p>Sélectionnez une formule dans la liste pour afficher son contenu interactif.</p>
                </div>
                <div id="formulaContent" style="display:none;">
                    <h3 id="formulaName" style="color:#0ff;margin-bottom:8px;text-shadow:0 0 8px rgba(0,255,255,0.3);"></h3>
                    <div class="formula-display" id="formulaDisplay"></div>
                    <div class="desc-display" id="formulaDesc"></div>
                    <div class="tabs" id="tabContainer">
                        <button class="tab-btn active" data-tab="lesson">📘 Cours</button>
                        <button class="tab-btn" data-tab="proof">📝 Preuve</button>
                        <button class="tab-btn" data-tab="exercise">📋 Exercice</button>
                        <button class="tab-btn" data-tab="sim">🎮 Simulation</button>
                    </div>
                    <div id="tabLesson" class="tab-content active"><div class="lesson-text" id="lessonText"></div></div>
                    <div id="tabProof" class="tab-content"><div id="proofContent"></div></div>
                    <div id="tabExercise" class="tab-content"><div id="exerciseContent"></div></div>
                    <div id="tabSim" class="tab-content">
                        <div class="canvas-wrapper"><canvas id="simCanvas" width="800" height="450"></canvas></div>
                        <div style="text-align:center;color:var(--text2);font-size:0.85rem;margin-top:6px;">
                            ⚡ Interactif – utilisez votre souris ou touchez l'écran
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <footer class="app-footer"><p>Rachidpro © 2024 – Encyclopédie Physique Interactive</p></footer>
    <script src="script.js"></script>
</body>
</html>
